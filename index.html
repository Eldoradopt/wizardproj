<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard Worms</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container"></div>
    <div id="status-text"
        style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-family: sans-serif; pointer-events: none; text-shadow: 2px 2px #000; text-align: center;">
        Loading...</div>

    <script src="https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@1.0.0/dist/index.js"
        onerror="document.getElementById('status-text').innerText='Error: Discord SDK failed to load'"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.min.js"
        onerror="document.getElementById('status-text').innerText='Error: Phaser Engine failed to load'"></script>
    <script src="src/main.js"
        onerror="document.getElementById('status-text').innerText='Error: main.js not found at src/main.js'"></script>
</body>

</html>
